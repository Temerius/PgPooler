services:
  pgpooler-analytics:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pgpooler
      POSTGRES_PASSWORD: pgpooler
      POSTGRES_DB: pgpooler
    ports:
      - "5434:5432"
    volumes:
      - ./migrations/001_init_analytics_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgpooler -d pgpooler"]
      interval: 2s
      timeout: 2s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./docker/init-primary:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10

  postgres2:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./docker/init-replica:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10

  pgpooler:
    build: .
    environment:
      CONFIG_PATH: /etc/pgpooler/pgpooler.yaml
      PGPOOLER_ANALYTICS_HOST: pgpooler-analytics
      PGPOOLER_ANALYTICS_PORT: "5432"
      PGPOOLER_ANALYTICS_USER: pgpooler
      PGPOOLER_ANALYTICS_PASSWORD: pgpooler
      PGPOOLER_ANALYTICS_DB: pgpooler
      PGPOOLER_ANALYTICS_ENABLED: "1"
    ports:
      - "6432:6432"
    volumes:
      - ./logs:/var/log/pgpooler
      - ./pgpooler.yaml:/etc/pgpooler/pgpooler.yaml
      - ./logging.yaml:/etc/pgpooler/logging.yaml
      - ./backends.yaml:/etc/pgpooler/backends.yaml
      - ./routing.yaml:/etc/pgpooler/routing.yaml
    depends_on:
      postgres:
        condition: service_healthy
      postgres2:
        condition: service_healthy
      pgpooler-analytics:
        condition: service_healthy

  test:
    image: postgres:16-alpine
    volumes:
      - ./tests:/tests
    environment:
      PGHOST: pgpooler
      PGPORT: 6432
    command: ["/bin/sh", "-c", "sed 's/\\r$//' /tests/run_routing_tests.sh | /bin/sh"]
    depends_on:
      pgpooler:
        condition: service_started
